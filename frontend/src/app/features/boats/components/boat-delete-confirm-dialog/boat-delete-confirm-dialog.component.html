<h2 mat-dialog-title>Delete boat</h2>

<mat-dialog-content>
  <p class="delete-question">
    Delete <span class="boat-name">"{{ data.name }}"</span>?
  </p>
  <p class="dialog-copy">This action cannot be undone.</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" cdkFocusInitial (click)="cancel()">Cancel</button>
  <button mat-flat-button type="button" color="warn" (click)="confirm()">Delete</button>
</mat-dialog-actions>

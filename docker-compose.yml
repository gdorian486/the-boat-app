services:
  frontend:
    build:
      context: ./frontend
    container_name: boat-frontend
    depends_on:
      backend:
        condition: service_started
      keycloak:
        condition: service_healthy
    environment:
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://localhost:8081}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-boat}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-boat-frontend}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-4200}:8080"

  postgres:
    image: postgres:17-alpine
    container_name: boat-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-boat}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-boat}"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: boat-keycloak
    command: ["start-dev", "--import-realm", "--health-enabled=true"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: http://localhost:${KEYCLOAK_PORT:-8081}
      KC_HOSTNAME_STRICT: "true"
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - ./docker/keycloak/realm:/opt/keycloak/data/import:ro
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "exec 3<>/dev/tcp/127.0.0.1/9000; printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q 'HTTP/1.1 200' <&3",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  backend:
    build:
      context: ./backend
    container_name: boat-backend
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-boat}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      OAUTH2_ISSUER_URI: http://localhost:${KEYCLOAK_PORT:-8081}/realms/boat
      OAUTH2_JWK_SET_URI: http://host.docker.internal:${KEYCLOAK_PORT:-8081}/realms/boat/protocol/openid-connect/certs
      JWT_AUDIENCE: ${JWT_AUDIENCE:-boat-api}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:${FRONTEND_PORT:-4200}}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

volumes:
  postgres_data:
